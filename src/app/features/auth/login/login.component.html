<div class="login-container">
  <div class="login-background">
    <div class="background-pattern"></div>
  </div>

  <div class="login-content">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="logo-container">
          <div class="logo">
            <span class="logo-text">BS</span>
          </div>
          <h1 class="app-title">Business Suite</h1>
        </div>
        <p class="app-subtitle">Sistema de gestión empresarial</p>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate>
        <!-- Company Selection -->
        <div class="form-group">
          <label for="companyId" class="form-label">
            Empresa
            <span class="required">*</span>
          </label>
          <select
            id="companyId"
            formControlName="companyId"
            class="form-select"
            [class.error]="hasError('companyId')"
            aria-describedby="companyId-error"
            aria-required="true"
          >
            <option value="">Seleccione una empresa</option>
            <option
              *ngFor="let company of companies()"
              [value]="company.id"
              [attr.aria-label]="company.name"
            >
              {{ company.name }} ({{ company.code }})
            </option>
          </select>
          <div
            *ngIf="hasError('companyId')"
            id="companyId-error"
            class="error-message"
            role="alert"
          >
            {{ getErrorMessage('companyId') }}
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username" class="form-label">
            Usuario
            <span class="required">*</span>
          </label>
          <input
            type="text"
            id="username"
            formControlName="username"
            class="form-input"
            [class.error]="hasError('username')"
            placeholder="Ingrese su nombre de usuario"
            aria-describedby="username-error"
            aria-required="true"
            autocomplete="username"
          />
          <div *ngIf="hasError('username')" id="username-error" class="error-message" role="alert">
            {{ getErrorMessage('username') }}
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">
            Contraseña
            <span class="required">*</span>
          </label>
          <input
            type="password"
            id="password"
            formControlName="password"
            class="form-input"
            [class.error]="hasError('password')"
            placeholder="Ingrese su contraseña"
            aria-describedby="password-error"
            aria-required="true"
            autocomplete="current-password"
          />
          <div *ngIf="hasError('password')" id="password-error" class="error-message" role="alert">
            {{ getErrorMessage('password') }}
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()" class="global-error" role="alert" aria-live="polite">
          <div class="error-content">
            <span class="error-icon">⚠️</span>
            <span class="error-text">{{ errorMessage() }}</span>
            <button
              type="button"
              class="error-close"
              (click)="clearError()"
              aria-label="Cerrar mensaje de error"
            >
              ✕
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="login-button"
          [disabled]="isLoading() || loginForm.invalid"
          [attr.aria-label]="isLoading() ? 'Iniciando sesión...' : 'Iniciar sesión'"
        >
          <span *ngIf="!isLoading()" class="button-text">
            <span class="button-icon">🔐</span>
            Ingresar
          </span>
          <span *ngIf="isLoading()" class="loading-spinner">
            <span class="spinner"></span>
            Iniciando sesión...
          </span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p class="demo-info">
          <strong>Demo:</strong> Use cualquier usuario (admin, manager, user) con contraseña:
          <code>password123</code>
        </p>
        <p class="version-info">Versión 1.0.0</p>
      </div>
    </div>
  </div>
</div>
